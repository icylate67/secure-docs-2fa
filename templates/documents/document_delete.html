{% extends 'base.html' %}

{% block title %}Удаление документа{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="mx-auto mb-3 stat-icon icon-danger">
                        <i class="bi bi-trash"></i>
                    </div>
                    <h2 class="fw-bold">Удаление документа</h2>
                    <p class="text-muted mb-0">Подтвердите удаление выбранного файла</p>
                </div>

                <div class="surface-box mb-4">
                    <div class="small text-muted">Название документа</div>
                    <div class="fw-semibold">{{ document.title }}</div>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <a href="{% url 'documents' %}" class="btn btn-outline-secondary flex-fill">Отмена</a>
                        <button type="submit" class="btn btn-danger flex-fill">
                            <i class="bi bi-trash me-2"></i>Удалить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

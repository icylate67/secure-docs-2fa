{% extends 'base.html' %}

{% block title %}Подтверждение TOTP{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">
        <div class="card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="mx-auto mb-3 stat-icon icon-primary">
                        <i class="bi bi-phone"></i>
                    </div>
                    <h2 class="fw-bold">Подтверждение TOTP</h2>
                    <p class="text-muted mb-0">Введите код из приложения-аутентификатора</p>
                </div>

                <div class="surface-box mb-4">
                    <div class="small text-muted">Пользователь</div>
                    <div class="fw-semibold">{{ user_obj.username }}</div>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="totp_code" class="form-label fw-semibold">Код из приложения</label>
                        <input
                            type="text"
                            name="totp_code"
                            id="totp_code"
                            class="form-control"
                            placeholder="Введите 6-значный код"
                            maxlength="6"
                            autocomplete="one-time-code"
                            required
                        >
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-dark py-3">
                            <i class="bi bi-check-circle me-2"></i>Подтвердить вход
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'back_to_2fa_selection' %}" class="text-decoration-none">
                        Выбрать другой способ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

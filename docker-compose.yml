services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      - db

volumes:
  postgres_data:
